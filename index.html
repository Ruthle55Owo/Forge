    safe = `${round(topWeight,1)} kg repeat ${formatReps(topSets)}`;

function distributeReps(total, sets, max, start){
  let arr = Array.from({length:sets},()=>Math.min(max, start));

}

function latestBodyCheckin(days=10){

}
function bodyReadinessContext(){
  const b = latestBodyCheckin(10) || {};

  const sleep=num(b.sleep), energy=num(b.energy), soreness=num(b.soreness), stress=num(b.stress), protein=num(b.protein);
  if(sleep){ if(sleep<5.5){score-=30;notes.push(`very low sleep ${sleep}h`);} else if(sleep<6.5){score-=20;notes.push(`low sleep ${sleep}h`);} else if(sleep<7.5){score-=8;notes.push(`okay sleep ${sleep}h`);} else notes.push(`sleep ${sleep}h`); }

  score = Math.max(0, Math.min(100, Math.round(score)));
  const label = score>=85?'Green':score>=70?'Mostly fine':score>=55?'Caution':'Recovery focus';
  return {score,label,checkin:b,note:notes.join(' · ')};
}
function muscleSummary(days=7){
  const cutoff = Date.now() - days*24*60*60*1000;
  const map = new Map();
  (db.sessions||[]).forEach(sess=>{
    const t=sessionTimeMs(sess); if(!t || t<cutoff) return;
    (sess.exercises||[]).forEach(ex=>{
      const sets=doneSets(ex); if(!sets.length) return;
      const vol=sets.reduce((a,s)=>a+exerciseSetVolume(ex.exerciseId,s),0); const rpe=Math.max(0,...sets.map(s=>num(s.rpe)));
      muscleTokensFor(ex.exerciseId).forEach(m=>{
        const o=map.get(m)||{muscle:m,sets:0,volume:0,lastTime:0,lastDate:'',rpe:0,exercises:new Set()};
        o.sets += sets.length; o.volume += vol; o.rpe=Math.max(o.rpe,rpe); o.exercises.add(ex.exerciseId);
        if(t>o.lastTime){ o.lastTime=t; o.lastDate=sess.date || (sess.start||'').slice(0,10); }
        map.set(m,o);

    });
  });

}
function muscleReadiness(muscle){

function progressStatsCards(entries){
  const allSets = entries.flatMap(e=>e.sets.map(s=>Object.assign({date:e.date,sessionName:e.sessionName},s)));
  const bestE = allSets.reduce((a,s)=>s.e1rm>a.e1rm?s:a,{e1rm:0,weight:0,reps:0});
  const heavy = allSets.reduce((a,s)=>s.weight>a.weight?s:a,{weight:0,reps:0});
  const vol = entries.reduce((a,e)=>e.volume>a.volume?e:a,{volume:0,date:''});
  return `<div class="card"><div class="muted small">Best estimated 1RM</div><div class="stat">${round(bestE.e1rm,1)} <small>kg</small></div><div class="muted small">${bestE.weight||0}×${bestE.reps||0}</div></div><div class="card"><div class="muted small">Heaviest set</div><div class="stat">${round(heavy.weight,1)} <small>kg</small></div><div class="muted small">for ${heavy.reps||0} reps</div></div><div class="card"><div class="muted small">Best session volume</div><div class="stat">${Math.round(vol.volume||0).toLocaleString()} <small>kg</small></div><div class="muted small">${vol.date?fmtDate(vol.date):'-'}</div></div>`;
}
function repRecordTable(entries){
  const map = new Map(); entries.forEach(e=>e.sets.forEach(s=>{ const key=s.reps; const old=map.get(key); if(!old || s.weight>old.weight) map.set(key,{...s,date:e.date}); }));
  const rows = [...map.values()].sort((a,b)=>a.reps-b.reps).map(r=>`<tr><td>${r.reps}</td><td>${round(r.weight,1)} kg</td><td>${fmtDate(r.date)}</td><td>${round(r.e1rm,1)} kg</td></tr>`).join('');
  return rows ? `<div class="tablewrap"><table><tr><th>Reps</th><th>Best weight</th><th>Date</th><th>e1RM</th></tr>${rows}</table></div>` : '<p class="muted">No records yet.</p>';
}

function cloudCfg(){
  db.settings.cloudSync = Object.assign({enabled:false,auto:true,autoPull:true,url:'',token:'',lastSync:'',lastError:'',lastPull:'',lastPullError:'',lastRemoteSavedAt:'',lastDiagnostic:'',lastPullMethod:''}, db.settings.cloudSync||{});
  return db.settings.cloudSync;
}
function dataSummary(d){
  return {
    sessions:(d.sessions||[]).length,
    sets:(d.sessions||[]).reduce((a,s)=>a+sessionSets(s),0),
    cardio:(d.cardio||[]).length,
    body:(d.body||[]).length,
    exercises:(d.exercises||[]).length,
    hash:dataFingerprint(d)
  };
}
function dataFingerprint(d){
  const slim = {
    sessions:(d.sessions||[]).map(s=>[s.id,s.date,s.end,sessionSets(s),Math.round(sessionVolume(s))]).sort(),
    cardio:(d.cardio||[]).map(c=>[c.id,c.date,c.type,c.distance,c.minutes]).sort(),
    body:(d.body||[]).map(b=>[b.id,b.date,b.weight,b.sleep,b.steps]).sort(),
    exercises:(d.exercises||[]).map(e=>[e.id,e.name,e.goalMin,e.goalMax,e.increment,e.sticky]).sort(),
    goals:(d.goals||[]).map(g=>[g.id,g.text,!!g.done]).sort()
  };
  const str = JSON.stringify(slim);
  let h = 0; for(let i=0;i<str.length;i++){ h=((h<<5)-h)+str.charCodeAt(i); h|=0; }
  return String(h);
}
function sanitizeDbForCloud(){
  const copy = clone(db);
  copy.settings = copy.settings || {};
  copy.settings.cloudSync = {enabled:false,auto:true,autoPull:true,lastSync:db.settings.cloudSync?.lastSync||'',lastPull:db.settings.cloudSync?.lastPull||''};
  copy.activeSession = null;
  copy.settings.syncedFrom = 'Forge Athlete';
  copy.settings.syncedAt = nowIso();
  return copy;
}
function mergeById(remoteArr=[], localArr=[], keepLocalOnConflict=false){
  const map = new Map();
  remoteArr.forEach(x=>{ if(x && x.id) map.set(x.id, clone(x)); });
  localArr.forEach(x=>{ if(!x || !x.id) return; if(!map.has(x.id) || keepLocalOnConflict) map.set(x.id, clone(x)); });
  return [...map.values()];
}
function mergeRemoteDb(remoteRaw){
  const localCloud = clone(cloudCfg());
  const localActive = db.activeSession ? clone(db.activeSession) : null;
  const before = dataSummary(db);
  const remote = migrate(remoteRaw || {});
  const merged = clone(db);
  merged.version = Math.max(num(db.version), num(remote.version), 7) || 7;
  merged.settings = Object.assign({}, remote.settings||{}, db.settings||{});
  merged.settings.cloudSync = localCloud;
  merged.exercises = mergeById(remote.exercises, db.exercises, true);
  merged.templates = mergeById(remote.templates, db.templates, true);
  merged.sessions = mergeById(remote.sessions, db.sessions, false).sort((a,b)=>String(a.date||'').localeCompare(String(b.date||'')));
  merged.cardio = mergeById(remote.cardio, db.cardio, false).sort((a,b)=>String(a.date||'').localeCompare(String(b.date||'')));
  merged.body = mergeById(remote.body, db.body, false).sort((a,b)=>String(a.date||'').localeCompare(String(b.date||'')));
  merged.goals = mergeById(remote.goals, db.goals, true);
  merged.activeSession = localActive;
  db = migrate(merged);
  db.settings.cloudSync = localCloud;
  const after = dataSummary(db);
  return {before, after, changed: before.hash !== after.hash};
}
function cloudSyncStatusText(){
  const c = cloudCfg();
  if(!c.url) return 'Not connected';
  const parts=[];
  if(c.lastSync) parts.push('last push ' + new Date(c.lastSync).toLocaleString());
  if(c.lastPull) parts.push('last pull ' + new Date(c.lastPull).toLocaleString());
  if(c.lastRemoteSavedAt) parts.push('cloud saved ' + new Date(c.lastRemoteSavedAt).toLocaleString());
  if(c.lastError) parts.push('push error: ' + c.lastError);
  if(c.lastPullError) parts.push('pull error: ' + c.lastPullError);
  return parts.length ? parts.join(' · ') : 'Connected, not synced yet';
}
function sheetSyncCard(){
  const c = cloudCfg();
  const enabled = c.enabled ? 'checked' : '';

function jsonp(url, params={}, timeoutMs=14000){
  return new Promise((resolve,reject)=>{
    const cb = '__forgePull_' + Date.now() + '_' + Math.random().toString(36).slice(2);
    const qs = Object.entries(Object.assign({}, params, {callback:cb})).map(([k,v])=>encodeURIComponent(k)+'='+encodeURIComponent(v==null?'':v)).join('&');
    const src = url + (url.includes('?')?'&':'?') + qs;
    const script = document.createElement('script');
    const timer = setTimeout(()=>{ cleanup(); reject(new Error('Pull timed out. Check Apps Script URL/token/deployment.')); }, timeoutMs);
    function cleanup(){ clearTimeout(timer); try{ delete window[cb]; }catch(e){ window[cb]=undefined; } if(script.parentNode) script.parentNode.removeChild(script); }
    window[cb] = data => { cleanup(); resolve(data); };
    script.onerror = () => { cleanup(); reject(new Error('Could not load Apps Script response.')); };
    script.src = src;
    document.body.appendChild(script);
  });
}
function iframePull(url, params={}, timeoutMs=18000){
  return new Promise((resolve,reject)=>{
    const pullId = 'forgeFrame_' + Date.now() + '_' + Math.random().toString(36).slice(2);
    const qs = Object.entries(Object.assign({}, params, {action:'pullFrame', pullId})).map(([k,v])=>encodeURIComponent(k)+'='+encodeURIComponent(v==null?'':v)).join('&');
    const src = url + (url.includes('?')?'&':'?') + qs;
    const iframe = document.createElement('iframe');
    iframe.style.position='fixed'; iframe.style.left='-9999px'; iframe.style.top='-9999px'; iframe.style.width='1px'; iframe.style.height='1px'; iframe.style.opacity='0';
    const timer = setTimeout(()=>{ cleanup(); reject(new Error('Frame pull timed out. Apps Script deployment is not responding to v10.0 pullFrame. Redeploy Apps Script as a NEW VERSION and make sure Forge uses the /exec URL.')); }, timeoutMs);
    function cleanup(){ clearTimeout(timer); window.removeEventListener('message', onMsg); if(iframe.parentNode) iframe.parentNode.removeChild(iframe); }
    function onMsg(event){
      const data = event.data || {};
      if(!data || data.source !== 'forge-pull' || data.pullId !== pullId) return;
      cleanup();
      resolve(data.payload);
    }
    window.addEventListener('message', onMsg);
    iframe.onerror = () => { cleanup(); reject(new Error('Could not load pull iframe.'))};
    iframe.src = src;
    document.body.appendChild(iframe);
  });
}
async function chunkedPull(url, token, reason, timeoutMs=12000){
  const meta = await jsonp(url, {action:'pullMeta', token, reason, at:nowIso(), build:APP_VERSION}, timeoutMs);
  if(!meta || !meta.ok) throw new Error((meta && meta.error) || 'pullMeta returned no data');
  if(!meta.chunks || meta.chunks < 1) return {ok:true, savedAt:meta.savedAt||'', db:null};
  const pieces = [];
  for(let i=1; i<=meta.chunks; i++){
    const part = await jsonp(url, {action:'pullChunk', token, index:i, reason, at:nowIso(), build:APP_VERSION}, timeoutMs);
    if(!part || !part.ok) throw new Error((part && part.error) || ('pullChunk '+i+' failed'));
    pieces.push(part.chunk || '');
  }
  const text = pieces.join('');
  if(meta.chars && text.length !== Number(meta.chars)) throw new Error('Chunk length mismatch. Expected '+meta.chars+' chars but got '+text.length+'. Push again from laptop, then retry.');
  const envelope = JSON.parse(text);
  return {ok:true, savedAt:envelope.savedAt || meta.savedAt || '', db:envelope.db || null};
}

async function pullWithFallbacks(c, reason){
  const errors = [];
  try{
    const res = await chunkedPull(c.url, c.token, reason, 12000);
    c.lastPullMethod = 'chunked';
    return res;
  }catch(err){
    errors.push('chunked failed: ' + (err && err.message ? err.message : String(err)));
  }
  try{
    const res = await jsonp(c.url, {action:'pullLatest', token:c.token, reason, at:nowIso(), build:APP_VERSION}, 14000);
    c.lastPullMethod = 'jsonp';
    return res;
  }catch(err){
    errors.push('JSONP failed: ' + (err && err.message ? err.message : String(err)));
  }
  try{
    const res = await iframePull(c.url, {token:c.token, reason, at:nowIso(), build:APP_VERSION}, 18000);
    c.lastPullMethod = 'iframe';
    return res;
  }catch(err){
    errors.push('iframe failed: ' + (err && err.message ? err.message : String(err)));
    throw new Error(errors.join(' | '));
  }
}

function activeExFromId(id, target='', rest=null, groupId=''){ const e=exById(id); const t=targetFor(id); const setsN = target && target.match(/^(\d+)/) ? +target.match(/^(\d+)/)[1] : 3; const sets = Array.from({length:Math.min(setsN||3,4)},()=>({id:uid(),weight:'',reps:'',rpe:'',done:false,type:'working',completedAt:''})); return {exerciseId:id,name:e.name,target:target||`${t.range.min}–${t.range.max}`,rest:rest||db.settings.defaultRest,groupId:groupId||'',sets}; }
function normSearch(s){
  return String(s||'').toLowerCase()
    .replace(/[°º]/g,' degree ')
    .replace(/[–—_\/\-]/g,' ')
    .replace(/[^a-z0-9\s]/g,' ')
    .replace(/\bextention\b/g,' extension ')
    .replace(/\bext\b/g,' extension ')
    .replace(/\bdb\b/g,' dumbbell ')
    .replace(/\bbb\b/g,' barbell ')
    .replace(/\bohp\b/g,' overhead press ')
    .replace(/\brdl\b/g,' romanian deadlift ')
    .replace(/\bbi\b/g,' biceps ')
    .replace(/\btri\b/g,' triceps ')
    .replace(/\blat\b/g,' lat lats ')
    .replace(/\bcalf\b/g,' calf calves ')
    .replace(/\s+/g,' ')
    .trim();
}
function exerciseAliases(e){
  const name = normSearch(e.name), muscle = normSearch(e.muscle), equip = normSearch(e.equipment), id = normSearch(e.id);
  const bits = [name, muscle, equip, id];
  if(/single leg/.test(name) || /singleleg/.test(id)) bits.push('single unilateral one leg one arm');
  if(/leg extension/.test(name)) bits.push('quad extension knee extension machine extension');
  if(/leg curl|hamstring curl|nordic/.test(name)) bits.push('hamstring curl lying curl seated curl leg flexion');
  if(/lateral raise/.test(name)) bits.push('lat raise side delt raise shoulder raise');
  if(/rear delt/.test(name)) bits.push('reverse fly rear shoulder posterior delt');
  if(/pulldown/.test(name)) bits.push('lat pull down back vertical pull');
  if(/row/.test(name)) bits.push('back pull horizontal pull');
  if(/bench|press/.test(name) && /chest/.test(muscle)) bits.push('chest press bench');
  if(/curl/.test(name) && /bicep|brachialis|forearm/.test(muscle)) bits.push('arm curl biceps curl');
  return normSearch(bits.join(' '));
}
function exerciseSearchScore(e, query){
  const q = normSearch(query);
  const hay = exerciseAliases(e);
  if(!q) return 1;
  const tokens = q.split(' ').filter(Boolean);
  let score = 0, missed = 0;
  if(hay.includes(q)) score += 80;
  tokens.forEach(tok => {
    if(hay.includes(tok)) score += 18;
    else {
      // loose prefix match: "exten" still hits extension, "sing" hits single
      const hit = hay.split(' ').some(w => w.startsWith(tok) || tok.startsWith(w));
      if(hit) score += 8; else missed += 1;
    }
  });
  // Prefer exact name starts, then names with all query words anywhere.
  const n = normSearch(e.name);
  if(n.startsWith(q)) score += 45;
  if(tokens.every(t => n.includes(t))) score += 25;
  if(missed) score -= missed * 20;
  return score;
}
function searchExercisesSmart(query, limit=40){
  const q = normSearch(query);
  return db.exercises.map(e => ({e, score: exerciseSearchScore(e,q)}))
    .filter(x => !q || x.score > 0)
    .sort((a,b) => b.score - a.score || a.e.name.localeCompare(b.e.name))
    .slice(0, limit)
    .map(x => x.e);
}

function sessionPrs(session){

  (session.exercises||[]).forEach(ex=>{
    const current=doneSets(ex);if(!current.length)return;
    const prior=exerciseSessionEntries(ex.exerciseId),priorBest=prior.length?Math.max(...prior.map(x=>x.bestE1rm)):0,currentBest=Math.max(0,...current.map(x=>exById(ex.exerciseId).loadMode==='assisted'?0:e1rm(x.weight,x.reps)));
    if(currentBest>0&&currentBest>priorBest+.1)prs.push({exerciseId:ex.exerciseId,name:ex.name,value:currentBest});
    else if(exById(ex.exerciseId).loadMode==='assisted'&&prior.length){const prevAssist=Math.min(...prior.slice(-3).flatMap(x=>x.sets).filter(x=>x.weight>0).map(x=>x.weight)),nowAssist=Math.min(...current.filter(x=>num(x.weight)>0).map(x=>num(x.weight)));if(Number.isFinite(nowAssist)&&Number.isFinite(prevAssist)&&nowAssist<prevAssist)prs.push({exerciseId:ex.exerciseId,name:ex.name,value:nowAssist,assisted:true});}
  });
  return prs;
}
function prHistoryForEntries(entries){
  let best=0;const out=[];
  entries.forEach(e=>{if(e.bestE1rm>best+.1){best=e.bestE1rm;out.push({date:e.date,sessionName:e.sessionName,value:e.bestE1rm});}});
  return out.reverse();
}

function exerciseConsistency(id,days=28){const cutoff=Date.now()-days*86400000;return exerciseSessionEntries(id).filter(e=>safeTime(e.date+'T12:00:00')>=cutoff).length;}

cause terrain, heat and devices differ, treat these as context rather than a diagnosis.</p><p class="warnbox small">These are coaching heuristics, not medical advice. Pain, unusual fatigue or health symptoms should override app recommendations.</p></div></div><div class="card method-card" style="margin-top:16px"><h3>Evidence and reference links</h3><p class="muted small">Forge uses these sources for broad principles, then applies clearly labelled personal heuristics. The sources do not validate the exact Forge readiness score.</p><div class="reference-list"><a href="https://pubmed.ncbi.nlm.nih.gov/41843416/" target="_blank" rel="noopener">ACSM 2026 position stand on resistance-training prescription</a><a href="https://pubmed.ncbi.nlm.nih.gov/26049792/" target="_blank" rel="noopener">Zourdos et al. — resistance-training RPE based on repetitions in reserve</a><a href="https://pubmed.ncbi.nlm.nih.gov/16937972/" target="_blank" rel="noopener">Reynolds et al. — limits and accuracy of submaximal 1RM prediction</a><a href="https://www.who.int/initiatives/behealthy/physical-activity" target="_blank" rel="noopener">WHO adult physical-activity recommendations</a></div></div>`;

    if(status.complete&&Number(status.total)===chunks.length)break;
    if(round===4)throw new Error(`Full upload incomplete: ${(status.received||[]).length}/${chunks.length} chunks received.`);
    for(const index of missing.length?missing:Array.from({length:chunks.length},(_,i)=>i+1))await sendChunk(index);

  transferred+=await postNoCors(c.url,{action:'syncFullCommit',token:c.token,uploadId,requestId:packageObj.requestId,sentAt:packageObj.sentAt,reason:packageObj.reason,app:packageObj.app});

  }catch(err){alert('Update check failed. Your offline app still works: '+(err?.message||String(err)));}
}

h><th>Type</th><th>Distance</th><th>Time</th><th>Pace</th><th>HR</th><th>Intensity</th><th>Notes</th><th></th></tr>${rows}</table></div></div>`;}

function overallStats(){

function cardioFatigueContext(muscles=[]){
  const lower=new Set(['quads','hamstrings','glutes','calves','adductors','tibialis','erectors']);
  if(!(muscles||[]).some(m=>lower.has(String(m).toLowerCase())))return{penalty:0,note:''};
  const now=Date.now(),age=num(db.settings.age)||18,maxHr=208-(0.7*age);let raw=0,hardMinutes=0;
  activeRecords(db.cardio).forEach(c=>{
    const t=safeTime((c.date||'')+'T12:00:00');if(!t)return;const hours=(now-t)/36e5;if(hours<0||hours>72)return;
    const mins=num(c.minutes),type=normSearch(c.type||''),intensity=normSearch(c.intensity||''),hr=num(c.hr),pct=hr?hr/maxHr:0;
    let base=/interval|hard/.test(intensity)||pct>=.82?13:/long run/.test(intensity)?14:/moderate/.test(intensity)||pct>=.68?6:/easy|walk/.test(intensity)?1.5:3;
    let mode=/run/.test(type)?1:/bike|cycle/.test(type)?.7:/walk/.test(type)?.25:/swim/.test(type)?.35:.5;
    const recency=hours<24?1:hours<48?.6:.3,duration=Math.min(1.6,Math.max(.45,mins/45||.45));
    raw+=base*mode*recency*duration;if(base>=12)hardMinutes+=mins;
  });
  const penalty=Math.min(22,Math.round(raw));
  return{penalty,note:penalty?`recent lower-body cardio fatigue −${penalty}${hardMinutes?` (${Math.round(hardMinutes)} hard min)`:''}`:''};
}
function weeklyCardioSummary(){
  const age=num(db.settings.age)||18,maxHr=208-(0.7*age),cutoff=Date.now()-7*86400000;let minutes=0,moderate=0,vigorous=0,easy=0;
  activeRecords(db.cardio).forEach(c=>{const t=safeTime((c.date||'')+'T12:00:00');if(!t||t<cutoff)return;const min=num(c.minutes);minutes+=min;const intensity=normSearch(c.intensity||'');const hr=num(c.hr);if(/hard|interval|long run/.test(intensity))vigorous+=min;else if(/easy|walk/.test(intensity))easy+=min;else if(hr){const pct=hr/maxHr;if(pct>=.76)vigorous+=min;else if(pct>=.64)moderate+=min;else easy+=min;}else moderate+=min;});
  return {minutes,moderate,vigorous,easy,maxHr,healthMinutes:moderate+vigorous*2};
}

function mergeRemoteDelta(partial){
  const before=dataSummary(db),localCloud=clone(cloudCfg()),localActive=db.activeSession?clone(db.activeSession):null;
  if(partial.settings){const safe=clone(partial.settings);delete safe.cloudSync;db.settings=Object.assign({},db.settings,safe,{cloudSync:localCloud});}
  const normalizers={exercises:x=>normaliseExercise(x),templates:x=>normaliseTemplate(x),sessions:x=>normaliseSession(x,false),cardio:x=>normaliseSimpleRecord(x,{}),body:x=>normaliseSimpleRecord(x,{}),goals:x=>normaliseSimpleRecord(x,{})};
  V10_CHANGE_COLLECTIONS.forEach(k=>{const changes=(partial[k]||[]).map(normalizers[k]);db[k]=mergeRecordCollections(changes,db[k]);});
  db.activeSession=localActive;db=migrate(db);db.settings.cloudSync=localCloud;const after=dataSummary(db);return {before,after,changed:before.hash!==after.hash};
}
async function chunkedPull(url,token,reason,timeoutMs=12000){
  const c=cloudCfg(),meta=await jsonp(url,{action:'pullMeta',token,reason,at:nowIso(),build:APP_VERSION},timeoutMs);if(!meta?.ok)throw new Error(meta?.error||'pullMeta returned no data');if(!meta.chunks||meta.chunks<1)return{ok:true,savedAt:meta.savedAt||'',checksum:meta.checksum||'',db:null};const pieces=[];
  for(let i=1;i<=meta.chunks;i++){setSyncProgress(`Pulling chunk ${i}/${meta.chunks}`);c.lastFailedChunk='';save();let part=null,lastErr=null;for(let attempt=1;attempt<=3;attempt++){try{part=await jsonp(url,{action:'pullChunk',token,index:i,reason,at:nowIso(),build:APP_VERSION},timeoutMs);if(part?.ok)break;throw new Error(part?.error||'chunk failed');}catch(e){lastErr=e;if(attempt<3)await new Promise(r=>setTimeout(r,500*attempt));}}if(!part?.ok){c.lastFailedChunk=String(i);setSyncProgress('');save();throw new Error(`Chunk ${i}/${meta.chunks} failed after retries: ${lastErr?.message||''}`);}pieces.push(part.chunk||'');}
  const text=pieces.join('');if(meta.chars&&text.length!==Number(meta.chars)){setSyncProgress('');throw new Error(`Chunk length mismatch. Expected ${meta.chars} chars but got ${text.length}.`);}const envelope=JSON.parse(text);setSyncProgress('');return{ok:true,savedAt:envelope.savedAt||meta.savedAt||'',checksum:meta.checksum||envelope.checksum||'',db:envelope.db||null};
}
function cloudSyncStatusText(){const c=cloudCfg(),parts=[];if(!c.url)return'Not connected';if(c.pending)parts.push('changes pending');if(c.lastPush||c.lastSync)parts.push('last push '+new Date(c.lastPush||c.lastSync).toLocaleString());if(c.lastPull)parts.push('last pull '+new Date(c.lastPull).toLocaleString());if(c.lastRemoteSavedAt)parts.push('cloud '+new Date(c.lastRemoteSavedAt).toLocaleString());if(c.lastError)parts.push('push error: '+c.lastError);if(c.lastPullError)parts.push('pull error: '+c.lastPullError);return parts.length?parts.join(' · '):'Connected, not synced yet';}
