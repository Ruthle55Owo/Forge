<script>
(() => {
'use strict';
const APP_KEY = 'forge_fitness_tracker_v5';
const OLD_KEYS = ['forge_fitness_tracker_v4','forge_fitness_tracker_v3','hevy_local_tracker_v2'];
const VIEW_KEY = 'forge_active_view_v5';
const $ = (s, root=document) => root.querySelector(s);
const $$ = (s, root=document) => Array.from(root.querySelectorAll(s));
const uid = () => (crypto && crypto.randomUUID ? crypto.randomUUID() : 'id-' + Date.now() + '-' + Math.random().toString(16).slice(2));
const today = () => new Date().toISOString().slice(0,10);
const nowIso = () => new Date().toISOString();
const num = v => { const n = parseFloat(v); return Number.isFinite(n) ? n : 0; };
const round = (v,d=1) => Number.isFinite(v) ? Math.round(v * 10**d) / 10**d : 0;
const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const clone = obj => JSON.parse(JSON.stringify(obj));
const fmtDate = iso => iso ? new Date(iso + (iso.length===10?'T00:00:00':'')).toLocaleDateString(undefined,{day:'2-digit',month:'short',year:'numeric'}) : '';
const shortDate = iso => iso ? new Date(iso + (iso.length===10?'T00:00:00':'')).toLocaleDateString(undefined,{month:'short',day:'numeric'}) : '';
const e1rm = (w,r) => num(w)>0 && num(r)>0 ? num(w) * (1 + num(r)/30) : 0;
const setVolume = s => num(s.weight) * num(s.reps);
const doneSets = ex => (ex.sets||[]).filter(s => s.done !== false && (num(s.weight) || num(s.reps)));
const sessionVolume = s => (s.exercises||[]).flatMap(doneSets).reduce((a,x)=>a+setVolume(x),0);
const sessionSets = s => (s.exercises||[]).flatMap(doneSets).length;
const paceStr = (dist, min) => num(dist)>0 && num(min)>0 ? `${Math.floor(num(min)/num(dist))}:${String(Math.round((num(min)/num(dist)%1)*60)).padStart(2,'0')}/km` : '-';
let seed = JSON.parse($('#seed-data').textContent);
let db = load();
let view = localStorage.getItem(VIEW_KEY) || 'dashboard';
let selectedExercise = (db.sessions?.[0]?.exercises?.[0]?.exerciseId) || (db.exercises?.[0]?.id);
let selectedMetric = 'bestE1rm';
let activeMetricTab = 'overview';
let restTimer = {id:null,left:0,total:0};
const pages = [
 ['dashboard','Dashboard','overview'],['log','Log workout','live training'],['next','Next targets','what to aim for'],['progress','Progression','exercise analytics'],['history','History','past sessions'],['exercises','Exercises','library + targets'],['cardio','Cardio','runs / bike'],['body','Body','weight + notes'],['settings','Settings','backup + storage']
];
function load(){
  let raw = localStorage.getItem(APP_KEY);
  let migratedFrom = '';
  if(!raw){ for(const k of OLD_KEYS){ raw = localStorage.getItem(k); if(raw){ migratedFrom = k; break; } } }
  let data;
  try{ data = raw ? JSON.parse(raw) : clone(seed); } catch(e){ data = clone(seed); }
  data = migrate(data);
  if(migratedFrom) data._migratedFrom = migratedFrom;
  return data;
}
function migrate(data){
  const d = Object.assign({version:6,settings:{},exercises:[],templates:[],sessions:[],cardio:[],body:[],goals:[],activeSession:null}, data||{});
  d.version = Math.max(num(d.version)||0, 6);
  d.settings = Object.assign({theme:'dark',weightUnit:'kg',distanceUnit:'km',defaultRest:120,name:'Thaddeus',defaultIncrement:2.5,createdAt:nowIso(),lastBackupAt:'',cloudSync:{enabled:false,auto:true,url:'',token:'',lastSync:'',lastError:''}}, d.settings||{});
  d.settings.cloudSync = Object.assign({enabled:false,auto:true,url:'',token:'',lastSync:'',lastError:''}, d.settings.cloudSync||{});
  d.exercises = (d.exercises||[]).map(e => Object.assign({id:uid(),name:'Exercise',muscle:'',equipment:'',notes:'',goalMin:null,goalMax:null,increment:null,sticky:''}, e));
  d.templates = d.templates||[]; d.sessions = d.sessions||[]; d.cardio = d.cardio||[]; d.body = d.body||[]; d.goals = d.goals||[];
  return d;
}
function save(){ localStorage.setItem(APP_KEY, JSON.stringify(db)); localStorage.setItem(VIEW_KEY, view); document.documentElement.dataset.theme = db.settings.theme || 'dark'; }
document.documentElement.dataset.theme = db.settings.theme || 'dark';
function exById(id){ return db.exercises.find(e=>e.id===id) || {id,name:'Unknown',muscle:'',equipment:'',goalMin:null,goalMax:null,increment:null,notes:'',sticky:''}; }
function findExerciseName(id){ return exById(id).name; }
function sessionsSorted(){ return [...(db.sessions||[])].sort((a,b)=>String(a.date||'').localeCompare(String(b.date||''))); }
function exerciseSessionEntries(exerciseId){
  const out=[];
  sessionsSorted().forEach(sess => (sess.exercises||[]).forEach((ex,idx)=>{
    if(ex.exerciseId === exerciseId || ex.name === findExerciseName(exerciseId)){
      const sets = doneSets(ex).map((s,i)=>({setIndex:i+1,weight:num(s.weight),reps:num(s.reps),rpe:num(s.rpe),type:s.type||'working',volume:setVolume(s),e1rm:e1rm(s.weight,s.reps),raw:s}));
      if(sets.length){
        const topWeight = Math.max(...sets.map(s=>s.weight));
        const topSets = sets.filter(s=>s.weight === topWeight);
        out.push({sessionId:sess.id,date:sess.date || (sess.start||'').slice(0,10),sessionName:sess.name||'Workout',exerciseIndex:idx,exercise:ex,sets,topWeight,topSets,
          bestE1rm:Math.max(...sets.map(s=>s.e1rm)),topReps:Math.max(...sets.map(s=>s.reps)),bestSetVolume:Math.max(...sets.map(s=>s.volume)),volume:sets.reduce((a,s)=>a+s.volume,0),totalReps:sets.reduce((a,s)=>a+s.reps,0),setCount:sets.length});
      }
    }
  }));
  return out;
}
function allExerciseIdsWithLogs(){
  const ids = new Set(); (db.sessions||[]).forEach(s => (s.exercises||[]).forEach(e => { if(doneSets(e).length) ids.add(e.exerciseId); }));
  return [...ids];
}
function inferRange(exerciseId){
  const ex = exById(exerciseId);
  if(num(ex.goalMin) && num(ex.goalMax)) return {min:num(ex.goalMin), max:num(ex.goalMax), source:'custom'};
  for(const tpl of db.templates||[]){ for(const te of tpl.exercises||[]){ if(te.exerciseId===exerciseId && te.target){ const m = String(te.target).match(/(\d+)\s*[×x]?\s*[–-]\s*(\d+)/); if(m) return {min:+m[1], max:+m[2], source:'template'}; } } }
  const m = (ex.muscle||'').toLowerCase(); const name=(ex.name||'').toLowerCase();
  if(/lateral|rear|raise|fly/.test(name)) return {min:10,max:20,source:'default isolation'};
  if(/curl|tricep|pressdown|extension|leg curl|leg extension/.test(name) || /bicep|tricep|calf/.test(m)) return {min:8,max:12,source:'default isolation'};
  if(/squat|deadlift|rdl|press|row|pulldown/.test(name)) return {min:6,max:10,source:'default compound'};
  return {min:6,max:10,source:'fallback'};
}
function incrementFor(exerciseId){
  const ex = exById(exerciseId); if(num(ex.increment)>0) return num(ex.increment);
  const name=(ex.name||'').toLowerCase(), equip=(ex.equipment||'').toLowerCase();
  if(/dumbbell|db/.test(name+' '+equip)) return 2.5;
  if(/lateral|rear|curl/.test(name)) return 1;
  if(/machine|cable/.test(equip)) return 2.5;
  return num(db.settings.defaultIncrement)||2.5;
}
function roundToInc(value, inc){ inc = num(inc)||2.5; return Math.round(num(value)/inc)*inc; }
function formatSets(sets){ return sets.map(s=>`${round(s.weight,1)}×${s.reps}`).join(', '); }
function targetFor(exerciseId){
  const entries = exerciseSessionEntries(exerciseId);
  const ex = exById(exerciseId), range = inferRange(exerciseId), inc = incrementFor(exerciseId);
  if(!entries.length) return {exerciseId, name:ex.name, status:'No logs yet', confidence:'none', best:'Log a baseline: 2–3 working sets inside your target rep range.', safe:'Start conservative and leave 1–3 reps in reserve.', stretch:'Only push if form is clean.', avoid:'Do not max out before you have a baseline.', reason:'No past sets exist for this exercise yet.', score:0, range, last:null, entries};
  const last = entries[entries.length-1];
  const topSets = last.topSets.length ? last.topSets : last.sets;
  const minRep = Math.min(...topSets.map(s=>s.reps));
  const maxRep = Math.max(...topSets.map(s=>s.reps));
  const avgRep = topSets.reduce((a,s)=>a+s.reps,0)/topSets.length;
  const topWeight = last.topWeight || Math.max(...last.sets.map(s=>s.weight));
  const allAtOrAboveMax = topSets.length >= 2 && topSets.every(s=>s.reps >= range.max);
  const belowMin = minRep < range.min;
  const highRpe = topSets.some(s => s.rpe >= 9.5);
  const prev = entries[entries.length-2];
  let trend = 'unknown';
  if(prev){ const diff = last.bestE1rm - prev.bestE1rm; trend = diff > .5 ? 'up' : diff < -.5 ? 'down' : 'flat'; }
  let best, safe, stretch, avoid, reason, status, score;
  if(allAtOrAboveMax && !highRpe){
    const nextW = roundToInc(topWeight + inc, inc);
    best = `${round(nextW,1)} kg for ${topSets.length}×${range.min}–${range.min+1}`;
    safe = `${round(topWeight,1)} kg again and beat total reps`;
    stretch = `${round(nextW,1)} kg for ${topSets.length}×${range.min+2} if warm-ups fly`;
    avoid = `Jumping more than ${inc} kg`;
    reason = `You reached the top of the ${range.min}–${range.max} range at your top work weight.`;
    status = 'Increase load'; score = 92;
  } else if(belowMin){
    const downW = Math.max(0, roundToInc(topWeight - inc, inc));
    best = `${round(downW,1)} kg for ${topSets.length}×${range.min}–${range.min+2}`;
    safe = `${round(topWeight,1)} kg and try +1 rep on the first set only`;
    stretch = `${round(topWeight,1)} kg until every set reaches ${range.min}`;
    avoid = `Increasing weight now`;
    reason = `Your top-weight sets are below the target range (${formatSets(topSets)} vs ${range.min}–${range.max}). Better stimulus usually comes from owning the range first.`;
    status = 'Build reps / possibly reduce'; score = 58;
  } else if(highRpe){
    best = `${round(topWeight,1)} kg, repeat sets and clean form`;
    safe = `${round(topWeight,1)} kg with same reps but lower RPE`;
    stretch = `+1 total rep across all top sets`;
    avoid = `Load increase while RPE is near max`;
    reason = `RPE was logged very high, so the app prioritises quality and recovery.`;
    status = 'Repeat'; score = 64;
  } else {
    const targetTotal = topSets.reduce((a,s)=>a+s.reps,0) + Math.min(3, topSets.length);
    const perSet = distributeReps(targetTotal, topSets.length, range.max, Math.max(range.min, Math.floor(avgRep)));
    best = `${round(topWeight,1)} kg for ${perSet.join('/')}`;
    safe = `${round(topWeight,1)} kg repeat ${formatReps(topSets)}`;
    stretch = `${round(topWeight,1)} kg and add 2–3 total reps`;
    avoid = `Adding weight before you hit about ${range.max}s`;
    reason = `You are inside the ${range.min}–${range.max} range, so double progression says add reps first.`;
    status = 'Add reps'; score = 78;
  }
  const confidence = entries.length >= 4 ? 'good' : entries.length >= 2 ? 'medium' : 'low';
  return {exerciseId,name:ex.name,status,confidence,best,safe,stretch,avoid,reason,score,range,last,prev,trend,entries};
}
function distributeReps(total, sets, max, start){
  let arr = Array.from({length:sets},()=>Math.min(max, start));
  let cur = arr.reduce((a,b)=>a+b,0), i=0;
  while(cur < total && arr.some(x=>x<max)){ if(arr[i%sets] < max){ arr[i%sets]++; cur++; } i++; if(i>100)break; }
  return arr;
}
function formatReps(sets){ return sets.map(s=>s.reps).join('/'); }

  db.settings.cloudSync = Object.assign({enabled:false,auto:true,autoPull:true,url:'',token:'',lastSync:'',lastError:'',lastPull:'',lastPullError:'',lastRemoteSavedAt:''}, db.settings.cloudSync||{});

function dataSummary(d){
  return {
    sessions:(d.sessions||[]).length,
    sets:(d.sessions||[]).reduce((a,s)=>a+sessionSets(s),0),
    cardio:(d.cardio||[]).length,
    body:(d.body||[]).length,
    exercises:(d.exercises||[]).length,
    hash:dataFingerprint(d)
  };
}
function dataFingerprint(d){
  const slim = {
    sessions:(d.sessions||[]).map(s=>[s.id,s.date,s.end,sessionSets(s),Math.round(sessionVolume(s))]).sort(),
    cardio:(d.cardio||[]).map(c=>[c.id,c.date,c.type,c.distance,c.minutes]).sort(),
    body:(d.body||[]).map(b=>[b.id,b.date,b.weight,b.sleep,b.steps]).sort(),
    exercises:(d.exercises||[]).map(e=>[e.id,e.name,e.goalMin,e.goalMax,e.increment,e.sticky]).sort(),
    goals:(d.goals||[]).map(g=>[g.id,g.text,!!g.done]).sort()
  };
  const str = JSON.stringify(slim);
  let h = 0; for(let i=0;i<str.length;i++){ h=((h<<5)-h)+str.charCodeAt(i); h|=0; }
  return String(h);
}
function sanitizeDbForCloud(){
  const copy = clone(db);
  copy.settings = copy.settings || {};
  copy.settings.cloudSync = {enabled:false,auto:true,autoPull:true,lastSync:db.settings.cloudSync?.lastSync||'',lastPull:db.settings.cloudSync?.lastPull||''};
  copy.activeSession = null;
  copy.settings.syncedFrom = 'Forge Athlete';
  copy.settings.syncedAt = nowIso();
  return copy;
}
function mergeById(remoteArr=[], localArr=[], keepLocalOnConflict=false){
  const map = new Map();
  remoteArr.forEach(x=>{ if(x && x.id) map.set(x.id, clone(x)); });
  localArr.forEach(x=>{ if(!x || !x.id) return; if(!map.has(x.id) || keepLocalOnConflict) map.set(x.id, clone(x)); });
  return [...map.values()];
}
function mergeRemoteDb(remoteRaw){
  const localCloud = clone(cloudCfg());
  const localActive = db.activeSession ? clone(db.activeSession) : null;
  const before = dataSummary(db);
  const remote = migrate(remoteRaw || {});
  const merged = clone(db);
  merged.version = Math.max(num(db.version), num(remote.version), 6) || 6;
  merged.settings = Object.assign({}, remote.settings||{}, db.settings||{});
  merged.settings.cloudSync = localCloud;
  merged.exercises = mergeById(remote.exercises, db.exercises, true);
  merged.templates = mergeById(remote.templates, db.templates, true);
  merged.sessions = mergeById(remote.sessions, db.sessions, false).sort((a,b)=>String(a.date||'').localeCompare(String(b.date||'')));
  merged.cardio = mergeById(remote.cardio, db.cardio, false).sort((a,b)=>String(a.date||'').localeCompare(String(b.date||'')));
  merged.body = mergeById(remote.body, db.body, false).sort((a,b)=>String(a.date||'').localeCompare(String(b.date||'')));
  merged.goals = mergeById(remote.goals, db.goals, true);
  merged.activeSession = localActive;
  db = migrate(merged);
  db.settings.cloudSync = localCloud;
  const after = dataSummary(db);
  return {before, after, changed: before.hash !== after.hash};
}
function cloudSyncStatusText(){

}

async function syncAllToSheets(manual=false, reason='manual'){
  const c = cloudCfg();
  if(!c.url || !c.token){ if(manual) alert('Add your Apps Script URL and secret token first.'); return; }
  const payload = {action:'syncAll', token:c.token, reason, sentAt:nowIso(), app:'Forge Athlete', db:sanitizeDbForCloud()};
  try{
    await fetch(c.url, {method:'POST', mode:'no-cors', headers:{'Content-Type':'text/plain;charset=utf-8'}, body:JSON.stringify(payload)});
    c.lastSync = nowIso(); c.lastError = '';
    save();
    if(manual) alert('Sent to Google Sheets. Open the Sheet and check the SyncLog tab.');
  }catch(err){
    c.lastError = err && err.message ? err.message : String(err);
    save();
    if(manual) alert('Could not send to Sheets: ' + c.lastError);
  }
}
function jsonp(url, params={}, timeoutMs=14000){
  return new Promise((resolve,reject)=>{
    const cb = '__forgePull_' + Date.now() + '_' + Math.random().toString(36).slice(2);
    const qs = Object.entries(Object.assign({}, params, {callback:cb})).map(([k,v])=>encodeURIComponent(k)+'='+encodeURIComponent(v==null?'':v)).join('&');
    const src = url + (url.includes('?')?'&':'?') + qs;
    const script = document.createElement('script');
    const timer = setTimeout(()=>{ cleanup(); reject(new Error('Pull timed out. Check Apps Script URL/token/deployment.')); }, timeoutMs);
    function cleanup(){ clearTimeout(timer); try{ delete window[cb]; }catch(e){ window[cb]=undefined; } if(script.parentNode) script.parentNode.removeChild(script); }
    window[cb] = data => { cleanup(); resolve(data); };
    script.onerror = () => { cleanup(); reject(new Error('Could not load Apps Script response.')); };
    script.src = src;
    document.body.appendChild(script);
  });
}
async function pullLatestFromSheets(manual=false, reason='manual'){
  const c = cloudCfg();
  if(!c.url || !c.token){ if(manual) alert('Add your Apps Script URL and secret token first.'); return; }
  if(db.activeSession && manual && !confirm('You have an active workout. Pulling will keep the active workout, but it is safer to finish/export first. Continue?')) return;
  try{
    const res = await jsonp(c.url, {action:'pullLatest', token:c.token, reason, at:nowIso()});
    if(!res || !res.ok) throw new Error((res && res.error) || 'Apps Script returned no data.');
    if(!res.db){ c.lastPull=nowIso(); c.lastPullError=''; save(); if(manual) alert('Connected, but no cloud backup exists yet. Press Push all data now first on your main device.'); return; }
    const info = mergeRemoteDb(res.db);
    const cc = cloudCfg();
    cc.lastPull = nowIso(); cc.lastPullError = ''; cc.lastRemoteSavedAt = res.savedAt || '';
    save();
    if(manual) alert(info.changed ? `Pulled and merged cloud data. Sessions: ${info.before.sessions} → ${info.after.sessions}.` : 'Pulled latest. No new data to merge.');
    if(info.changed) render();
  }catch(err){
    const cc = cloudCfg(); cc.lastPullError = err && err.message ? err.message : String(err); save();
    if(manual) alert('Could not pull from Sheets: ' + cc.lastPullError);
  }
}

  const bc=$('#bodyChart'); if(bc){ const data=[...db.body].filter(x=>num(x.weight)>0).sort((a,b)=>String(a.date).localeCompare(String(b.date))).map(x=>({date:x.date,value:num(x.weight)})); drawLine(bc,data); }
}
function prepCanvas(canvas){ const rect=canvas.getBoundingClientRect(); const dpr=window.devicePixelRatio||1; canvas.width=rect.width*dpr; canvas.height=rect.height*dpr; const ctx=canvas.getContext('2d'); ctx.scale(dpr,dpr); return {ctx,w:rect.width,h:rect.height}; }
function drawLine(canvas, data){ const {ctx,w,h}=prepCanvas(canvas); ctx.clearRect(0,0,w,h); const pad=35; ctx.strokeStyle=getCss('--line'); ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(pad,15); ctx.lineTo(pad,h-pad); ctx.lineTo(w-10,h-pad); ctx.stroke(); if(!data.length){ text(ctx,'No data yet',w/2,h/2,'center'); return; } const vals=data.map(d=>num(d.value)); let min=Math.min(...vals), max=Math.max(...vals); if(min===max){ min-=1; max+=1; } const x=i=> data.length===1 ? w/2 : pad + i*(w-pad-15)/(data.length-1); const y=v=> h-pad - (v-min)/(max-min)*(h-pad-25); ctx.strokeStyle=getCss('--accent'); ctx.lineWidth=2.5; ctx.beginPath(); data.forEach((d,i)=>{ if(i)ctx.lineTo(x(i),y(num(d.value))); else ctx.moveTo(x(i),y(num(d.value))); }); ctx.stroke(); data.forEach((d,i)=>{ctx.fillStyle=getCss('--accent'); ctx.beginPath(); ctx.arc(x(i),y(num(d.value)),4,0,Math.PI*2); ctx.fill();}); ctx.fillStyle=getCss('--muted'); ctx.font='12px system-ui'; text(ctx,round(max,1),5,22,'left'); text(ctx,round(min,1),5,h-pad,'left'); if(data.length===1) text(ctx,'baseline only — log again to see trend',w/2,h-14,'center'); else { text(ctx,shortDate(data[0].date),pad,h-10,'center'); text(ctx,shortDate(data[data.length-1].date),w-25,h-10,'center'); } }
function drawBars(canvas, data, key){ const {ctx,w,h}=prepCanvas(canvas); ctx.clearRect(0,0,w,h); if(!data.length){ text(ctx,'No volume yet',w/2,h/2,'center'); return; } const pad=30; const max=Math.max(...data.map(d=>num(d[key])),1); const bw=(w-pad-20)/data.length*.65; data.forEach((d,i)=>{const x=pad+i*(w-pad-20)/data.length+8; const bh=num(d[key])/max*(h-pad-20); ctx.fillStyle=getCss('--accent'); ctx.fillRect(x,h-pad-bh,bw,bh); ctx.fillStyle=getCss('--muted'); ctx.font='11px system-ui'; text(ctx,shortDate(d.date),x+bw/2,h-9,'center');}); }
function text(ctx,str,x,y,align){ ctx.fillStyle=getCss('--muted'); ctx.textAlign=align||'left'; ctx.font='12px system-ui'; ctx.fillText(String(str),x,y); }
function getCss(v){ return getComputedStyle(document.documentElement).getPropertyValue(v).trim(); }
render();
setTimeout(()=>maybeAutoPull('open'), 900);
window.addEventListener('online', ()=>maybeAutoPull('online'));
document.addEventListener('visibilitychange', ()=>{ if(document.visibilityState==='visible') maybeAutoPull('visible'); });
})();
</script>
