:root{

}
[data-theme="light"]{ --bg:#f4f7fb; --panel:#ffffff; --panel2:#f8fafc; --card:#ffffff; --muted:#5f6f86; --text:#0f172a; --line:#d8e0ea; --chip:#eef4ff; --shadow:0 12px 30px rgba(15,23,42,.08); }
*{box-sizing:border-box} body{margin:0;background:radial-gradient(900px 500px at 10% -10%,rgba(125,211,252,.15),transparent 55%),radial-gradient(800px 550px at 100% 0,rgba(167,139,250,.13),transparent 55%),var(--bg);color:var(--text);font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;line-height:1.35}
button,input,select,textarea{font:inherit} button{cursor:pointer} a{color:var(--accent)}
.app{display:grid;grid-template-columns:280px 1fr;min-height:100vh}.side{position:sticky;top:0;height:100vh;padding:22px;background:linear-gradient(180deg,rgba(17,24,39,.95),rgba(12,18,32,.95));border-right:1px solid var(--line);overflow:auto}.brand{display:flex;gap:12px;align-items:center;margin-bottom:18px}.logo{width:42px;height:42px;border-radius:14px;background:linear-gradient(135deg,var(--accent),var(--accent2));box-shadow:0 10px 30px rgba(125,211,252,.2)}.brand h1{font-size:20px;margin:0}.brand p{margin:2px 0 0;color:var(--muted);font-size:12px}.nav{display:grid;gap:8px;margin-top:16px}.nav button{border:1px solid transparent;background:transparent;color:var(--muted);padding:11px 12px;border-radius:13px;text-align:left;display:flex;justify-content:space-between;align-items:center}.nav button.active,.nav button:hover{background:var(--chip);color:var(--text);border-color:var(--line)}.main{padding:22px;max-width:1320px;width:100%;margin:0 auto}.topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:20px}.topbar h2{font-size:28px;margin:0}.topbar .sub{color:var(--muted);font-size:14px}.grid{display:grid;gap:16px}.grid.cols2{grid-template-columns:1fr 1fr}.grid.cols3{grid-template-columns:repeat(3,1fr)}.grid.cols4{grid-template-columns:repeat(4,1fr)}.card{background:linear-gradient(180deg,rgba(255,255,255,.035),rgba(255,255,255,.015)),var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow)}.card h3{margin:0 0 10px;font-size:17px}.card h4{margin:12px 0 8px}.muted{color:var(--muted)}.small{font-size:12px}.stat{font-size:30px;font-weight:800}.stat small{font-size:13px;color:var(--muted);font-weight:600}.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.between{display:flex;justify-content:space-between;gap:10px;align-items:center}.btn{border:1px solid var(--line);background:var(--panel2);color:var(--text);padding:10px 13px;border-radius:12px}.btn:hover{filter:brightness( :root{ color-scheme: dark; }

ulation</span><span class="pill">Weekly set volume</span><span class="pill">HR intensity zones</span><span class="pill">Sleep/recovery</span></div></div>`;

rd" style="margin-top:16px"><h3>No data yet</h3><p class="muted">These are ready in the 200-exercise library but not logged yet: ${no.map(e=>esc(e.name)).join(', ')}.</p></div>`:''}`;

function progressStatsCards(entries){
  const allSets = entries.flatMap(e=>e.sets.map(s=>Object.assign({date:e.date,sessionName:e.sessionName},s)));

  const vol = entries.reduce((a,e)=>e.volume>a.volume?e:a,{volume:0,date:''});
  return `<div class="card"><div class="muted small">Best estimated 1RM</div><div class="stat">${round(bestE.e1rm,1)} <small>kg</small></div><div class="muted small">${bestE.weight||0}×${bestE.reps||0}</div></div><div class="card"><div class="muted small">Heaviest set</div><div class="stat">${round(heavy.weight,1)} <small>kg</small></div><div class="muted small">for ${heavy.reps||0} reps</div></div><div class="card"><div class="muted small">Best session volume</div><div class="stat">${Math.round(vol.volume||0).toLocaleString()} <small>kg</small></div><div class="muted small">${vol.date?fmtDate(vol.date):'-'}</div></div>`;

function repRecordTable(entries){

}

function dataSummary(d){
  return {
    sessions:(d.sessions||[]).length,
    sets:(d.sessions||[]).reduce((a,s)=>a+sessionSets(s),0),
    cardio:(d.cardio||[]).length,
    body:(d.body||[]).length,
    exercises:(d.exercises||[]).length,
    hash:dataFingerprint(d)
  };
}
function dataFingerprint(d){
  const slim = {
    sessions:(d.sessions||[]).map(s=>[s.id,s.date,s.end,sessionSets(s),Math.round(sessionVolume(s))]).sort(),
    cardio:(d.cardio||[]).map(c=>[c.id,c.date,c.type,c.distance,c.minutes]).sort(),
    body:(d.body||[]).map(b=>[b.id,b.date,b.weight,b.sleep,b.steps]).sort(),
    exercises:(d.exercises||[]).map(e=>[e.id,e.name,e.goalMin,e.goalMax,e.increment,e.sticky]).sort(),
    goals:(d.goals||[]).map(g=>[g.id,g.text,!!g.done]).sort()
  };
  const str = JSON.stringify(slim);
  let h = 0; for(let i=0;i<str.length;i++){ h=((h<<5)-h)+str.charCodeAt(i); h|=0; }
  return String(h);
}
function sanitizeDbForCloud(){
  const copy = clone(db);
  copy.settings = copy.settings || {};
  copy.settings.cloudSync = {enabled:false,auto:true,autoPull:true,lastSync:db.settings.cloudSync?.lastSync||'',lastPull:db.settings.cloudSync?.lastPull||''};
  copy.activeSession = null;
  copy.settings.syncedFrom = 'Forge Athlete';
  copy.settings.syncedAt = nowIso();
  return copy;
}
function mergeById(remoteArr=[], localArr=[], keepLocalOnConflict=false){
  const map = new Map();
  remoteArr.forEach(x=>{ if(x && x.id) map.set(x.id, clone(x)); });
  localArr.forEach(x=>{ if(!x || !x.id) return; if(!map.has(x.id) || keepLocalOnConflict) map.set(x.id, clone(x)); });
  return [...map.values()];
}
function mergeRemoteDb(remoteRaw){
  const localCloud = clone(cloudCfg());
  const localActive = db.activeSession ? clone(db.activeSession) : null;
  const before = dataSummary(db);
  const remote = migrate(remoteRaw || {});
  const merged = clone(db);
  merged.version = Math.max(num(db.version), num(remote.version), 7) || 7;
  merged.settings = Object.assign({}, remote.settings||{}, db.settings||{});
  merged.settings.cloudSync = localCloud;
  merged.exercises = mergeById(remote.exercises, db.exercises, true);
  merged.templates = mergeById(remote.templates, db.templates, true);
  merged.sessions = mergeById(remote.sessions, db.sessions, false).sort((a,b)=>String(a.date||'').localeCompare(String(b.date||'')));
  merged.cardio = mergeById(remote.cardio, db.cardio, false).sort((a,b)=>String(a.date||'').localeCompare(String(b.date||'')));
  merged.body = mergeById(remote.body, db.body, false).sort((a,b)=>String(a.date||'').localeCompare(String(b.date||'')));
  merged.goals = mergeById(remote.goals, db.goals, true);
  merged.activeSession = localActive;
  db = migrate(merged);
  db.settings.cloudSync = localCloud;
  const after = dataSummary(db);
  return {before, after, changed: before.hash !== after.hash};
}
function cloudSyncStatusText(){
  const c = cloudCfg();

  if(c.lastSync) parts.push('last push ' + new Date(c.lastSync).toLocaleString());
  if(c.lastPull) parts.push('last pull ' + new Date(c.lastPull).toLocaleString());
  if(c.lastRemoteSavedAt) parts.push('cloud saved ' + new Date(c.lastRemoteSavedAt).toLocaleString());
  if(c.lastError) parts.push('push error: ' + c.lastError);

  return parts.length ? parts.join(' · ') : 'Connected, not synced yet';
}

function jsonp(url, params={}, timeoutMs=14000){
  return new Promise((resolve,reject)=>{
    const cb = '__forgePull_' + Date.now() + '_' + Math.random().toString(36).slice(2);
    const qs = Object.entries(Object.assign({}, params, {callback:cb})).map(([k,v])=>encodeURIComponent(k)+'='+encodeURIComponent(v==null?'':v)).join('&');
    const src = url + (url.includes('?')?'&':'?') + qs;
    const script = document.createElement('script');
    const timer = setTimeout(()=>{ cleanup(); reject(new Error('Pull timed out. Check Apps Script URL/token/deployment.')); }, timeoutMs);
    function cleanup(){ clearTimeout(timer); try{ delete window[cb]; }catch(e){ window[cb]=undefined; } if(script.parentNode) script.parentNode.removeChild(script); }
    window[cb] = data => { cleanup(); resolve(data); };
    script.onerror = () => { cleanup(); reject(new Error('Could not load Apps Script response.')); };
    script.src = src;
    document.body.appendChild(script);
  });
}
function iframePull(url, params={}, timeoutMs=18000){
  return new Promise((resolve,reject)=>{
    const pullId = 'forgeFrame_' + Date.now() + '_' + Math.random().toString(36).slice(2);
    const qs = Object.entries(Object.assign({}, params, {action:'pullFrame', pullId})).map(([k,v])=>encodeURIComponent(k)+'='+encodeURIComponent(v==null?'':v)).join('&');
    const src = url + (url.includes('?')?'&':'?') + qs;
    const iframe = document.createElement('iframe');
    iframe.style.position='fixed'; iframe.style.left='-9999px'; iframe.style.top='-9999px'; iframe.style.width='1px'; iframe.style.height='1px'; iframe.style.opacity='0';
    const timer = setTimeout(()=>{ cleanup(); reject(new Error('Frame pull timed out. Apps Script deployment is not responding to v9.5 pullFrame. Redeploy Apps Script as a NEW VERSION and make sure Forge uses the /exec URL.')); }, timeoutMs);
    function cleanup(){ clearTimeout(timer); window.removeEventListener('message', onMsg); if(iframe.parentNode) iframe.parentNode.removeChild(iframe); }
    function onMsg(event){
      const data = event.data || {};
      if(!data || data.source !== 'forge-pull' || data.pullId !== pullId) return;
      cleanup();
      resolve(data.payload);
    }
    window.addEventListener('message', onMsg);
    iframe.onerror = () => { cleanup(); reject(new Error('Could not load pull iframe.'))};
    iframe.src = src;
    document.body.appendChild(iframe);
  });
}
async function pullWithFallbacks(c, reason){
  let firstErr = '';
  try{
    const res = await jsonp(c.url, {action:'pullLatest', token:c.token, reason, at:nowIso(), build:APP_VERSION}, 14000);
    c.lastPullMethod = 'jsonp';
    return res;
  }catch(err){
    firstErr = err && err.message ? err.message : String(err);
  }
  try{
    const res = await iframePull(c.url, {token:c.token, reason, at:nowIso(), build:APP_VERSION}, 18000);
    c.lastPullMethod = 'iframe';
    return res;
  }catch(err){
    const secondErr = err && err.message ? err.message : String(err);
    throw new Error('JSONP failed: ' + firstErr + ' | iframe failed: ' + secondErr);
  }
}

async function pullLatestFromSheets(manual=false, reason='manual'){
  const c = cloudCfg();
  if(!c.url || !c.token){ if(manual) alert('Add your Apps Script URL and secret token first.'); return; }
  if(db.activeSession && manual && !confirm('You have an active workout. Pulling will keep the active workout, but it is safer to finish/export first. Continue?')) return;
  try{
    const res = await pullWithFallbacks(c, reason);
    if(!res || !res.ok) throw new Error((res && res.error) || 'Apps Script returned no data.');
    if(!res.db){ c.lastPull=nowIso(); c.lastPullError=''; c.lastDiagnostic='Connected but cloud backup is empty. Push once from the main device.'; save(); if(manual) alert('Connected, but no cloud backup exists yet. Press Push all data now first on your main device.'); return; }
    const info = mergeRemoteDb(res.db);
    const cc = cloudCfg();
    cc.lastPull = nowIso(); cc.lastPullError = ''; cc.lastRemoteSavedAt = res.savedAt || ''; cc.lastDiagnostic = 'Pull ok via ' + (cc.lastPullMethod||'unknown') + ' at ' + new Date().toLocaleString();
    save();
    if(manual) alert(info.changed ? `Pulled and merged cloud data. Sessions: ${info.before.sessions} → ${info.after.sessions}.` : 'Pulled latest. No new data to merge.');
    if(info.changed) render();
  }catch(err){
    const cc = cloudCfg(); cc.lastPullError = err && err.message ? err.message : String(err); cc.lastDiagnostic = 'Pull failed at ' + new Date().toLocaleString() + ': ' + cc.lastPullError; save();
    if(manual) alert('Could not pull from Sheets: ' + cc.lastPullError);
  }
}

}
function renderSettings(){

y viewing, and manual JSON exports for full restore.</p><div class="row"><span class="pill good">Local-first</span><span class="pill good">Optional Sheets mirror</span><span class="pill good">Manual JSON backup</span></div><p class="muted small">Do not put your secret token in GitHub. Only type it into this Settings page on your own phone.</p></div></div><div class="card" style="margin-top:16px"><h3>Feature checklist added</h3><div class="row"><span class="pill good">Individual exercise graphs</span><span class="pill good">Next targets</span><span class="pill good">Best / safe / stretch / avoid</span><span class="pill good">Rep records</span><span class="pill good">RPE field</span><span class="pill good">Set types</span><span class="pill good">Custom rep range</span><span class="pill good">Two-way Sheets sync</span><span class="pill good">200-exercise library</span><span class="pill good">Template builder</span><span class="pill good">Superset groups</span><span class="pill good">Overtime targets</span><span class="pill good">Stacking logic</span><span class="pill good">Coach readiness</span><span class="pill good">Weekly muscle load</span><span class="pill good">Deload warnings</span><span class="pill good">Calculation methods</span></div></div>`;

function activeExFromId(id, target='', rest=null, groupId=''){ const e=exById(id); const t=targetFor(id); const setsN = target && target.match(/^(\d+)/) ? +target.match(/^(\d+)/)[1] : 3; const sets = Array.from({length:Math.min(setsN||3,4)},()=>({id:uid(),weight:'',reps:'',rpe:'',done:false,type:'working',completedAt:''})); return {exerciseId:id,name:e.name,target:target||`${t.range.min}–${t.range.max}`,rest:rest||db.settings.defaultRest,groupId:groupId||'',sets}; }
function normSearch(s){
  return String(s||'').toLowerCase()
    .replace(/[°º]/g,' degree ')
    .replace(/[–—_\/\-]/g,' ')
    .replace(/[^a-z0-9\s]/g,' ')
    .replace(/\bextention\b/g,' extension ')
    .replace(/\bext\b/g,' extension ')
    .replace(/\bdb\b/g,' dumbbell ')
    .replace(/\bbb\b/g,' barbell ')
    .replace(/\bohp\b/g,' overhead press ')
    .replace(/\brdl\b/g,' romanian deadlift ')
    .replace(/\bbi\b/g,' biceps ')
    .replace(/\btri\b/g,' triceps ')
    .replace(/\blat\b/g,' lat lats ')
    .replace(/\bcalf\b/g,' calf calves ')
    .replace(/\s+/g,' ')
    .trim();
}
function exerciseAliases(e){
  const name = normSearch(e.name), muscle = normSearch(e.muscle), equip = normSearch(e.equipment), id = normSearch(e.id);
  const bits = [name, muscle, equip, id];
  if(/single leg/.test(name) || /singleleg/.test(id)) bits.push('single unilateral one leg one arm');
  if(/leg extension/.test(name)) bits.push('quad extension knee extension machine extension');
  if(/leg curl|hamstring curl|nordic/.test(name)) bits.push('hamstring curl lying curl seated curl leg flexion');
  if(/lateral raise/.test(name)) bits.push('lat raise side delt raise shoulder raise');
  if(/rear delt/.test(name)) bits.push('reverse fly rear shoulder posterior delt');
  if(/pulldown/.test(name)) bits.push('lat pull down back vertical pull');
  if(/row/.test(name)) bits.push('back pull horizontal pull');
  if(/bench|press/.test(name) && /chest/.test(muscle)) bits.push('chest press bench');
  if(/curl/.test(name) && /bicep|brachialis|forearm/.test(muscle)) bits.push('arm curl biceps curl');
  return normSearch(bits.join(' '));
}
function exerciseSearchScore(e, query){
  const q = normSearch(query);
  const hay = exerciseAliases(e);
  if(!q) return 1;
  const tokens = q.split(' ').filter(Boolean);
  let score = 0, missed = 0;
  if(hay.includes(q)) score += 80;
  tokens.forEach(tok => {
    if(hay.includes(tok)) score += 18;
    else {
      // loose prefix match: "exten" still hits extension, "sing" hits single
      const hit = hay.split(' ').some(w => w.startsWith(tok) || tok.startsWith(w));
      if(hit) score += 8; else missed += 1;
    }
  });
  // Prefer exact name starts, then names with all query words anywhere.
  const n = normSearch(e.name);
  if(n.startsWith(q)) score += 45;
  if(tokens.every(t => n.includes(t))) score += 25;
  if(missed) score -= missed * 20;
  return score;
}
function searchExercisesSmart(query, limit=40){
  const q = normSearch(query);
  return db.exercises.map(e => ({e, score: exerciseSearchScore(e,q)}))
    .filter(x => !q || x.score > 0)
    .sort((a,b) => b.score - a.score || a.e.name.localeCompare(b.e.name))
    .slice(0, limit)
    .map(x => x.e);
}

function editExercise(id){ const e = id ? exById(id) : {id:uid(),name:'',muscle:'',equipment:'',notes:'',goalMin:null,goalMax:null,increment:null,sticky:''}; showModal(`<h3>${id?'Edit':'New'} exercise</h3><div class="fields two"><div class="field"><label>Name</label><input id="exName" value="${esc(e.name)}"></div><div class="field"><label>Muscle</label><input id="exMuscle" value="${esc(e.muscle)}"></div><div class="field"><label>Equipment</label><input id="exEquip" value="${esc(e.equipment)}"></div><div class="field"><label>Increment kg</label><input id="exInc" type="number" step="0.5" value="${e.increment||''}"></div><div class="field"><label>Rep min</label><input id="exMin" type="number" value="${e.goalMin||''}"></div><div class="field"><label>Rep max</label><input id="exMax" type="number" value="${e.goalMax||''}"></div></div><div class="field"><label>Sticky note shown during workouts</label><textarea id="exSticky">${esc(e.sticky||'')}</textarea></div><div class="field"><label>Notes</label><textarea id="exNotes">${esc(e.notes||'')}</textarea></div><div class="row"><button class="btn primary" id="saveEx">Save</button><button class="btn" id="closeModal">Cancel</button></div>`); $('#closeModal').onclick=hideModal; $('#saveEx').onclick=()=>{ e.name=$('#exName').value||'Exercise'; e.muscle=$('#exMuscle').value; e.equipment=$('#exEquip').value; e.increment=num($('#exInc').value)||null; e.goalMin=num($('#exMin').value)||null; e.goalMax=num($('#exMax').value)||null; e.sticky=$('#exSticky').value; e.notes=$('#exNotes').value; if(!id) db.exercises.push(e); save(); hideModal(); render(); }; }

function volumeByWeek(){

}

function prepCanvas(canvas){ const rect=canvas.getBoundingClientRect(); const dpr=window.devicePixelRatio||1; canvas.width=rect.width*dpr; canvas.height=rect.height*dpr; const ctx=canvas.getContext('2d'); ctx.scale(dpr,dpr); return {ctx,w:rect.width,h:rect.height}; }
function drawLine(canvas, data){ const {ctx,w,h}=prepCanvas(canvas); ctx.clearRect(0,0,w,h); const pad=35; ctx.strokeStyle=getCss('--line'); ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(pad,15); ctx.lineTo(pad,h-pad); ctx.lineTo(w-10,h-pad); ctx.stroke(); if(!data.length){ text(ctx,'No data yet',w/2,h/2,'center'); return; } const vals=data.map(d=>num(d.value)); let min=Math.min(...vals), max=Math.max(...vals); if(min===max){ min-=1; max+=1; } const x=i=> data.length===1 ? w/2 : pad + i*(w-pad-15)/(data.length-1); const y=v=> h-pad - (v-min)/(max-min)*(h-pad-25); ctx.strokeStyle=getCss('--accent'); ctx.lineWidth=2.5; ctx.beginPath(); data.forEach((d,i)=>{ if(i)ctx.lineTo(x(i),y(num(d.value))); else ctx.moveTo(x(i),y(num(d.value))); }); ctx.stroke(); data.forEach((d,i)=>{ctx.fillStyle=getCss('--accent'); ctx.beginPath(); ctx.arc(x(i),y(num(d.value)),4,0,Math.PI*2); ctx.fill();}); ctx.fillStyle=getCss('--muted'); ctx.font='12px system-ui'; text(ctx,round(max,1),5,22,'left'); text(ctx,round(min,1),5,h-pad,'left'); if(data.length===1) text(ctx,'baseline only — log again to see trend',w/2,h-14,'center'); else { text(ctx,shortDate(data[0].date),pad,h-10,'center'); text(ctx,shortDate(data[data.length-1].date),w-25,h-10,'center'); } }
function drawBars(canvas, data, key){ const {ctx,w,h}=prepCanvas(canvas); ctx.clearRect(0,0,w,h); if(!data.length){ text(ctx,'No volume yet',w/2,h/2,'center'); return; } const pad=30; const max=Math.max(...data.map(d=>num(d[key])),1); const bw=(w-pad-20)/data.length*.65; data.forEach((d,i)=>{const x=pad+i*(w-pad-20)/data.length+8; const bh=num(d[key])/max*(h-pad-20); ctx.fillStyle=getCss('--accent'); ctx.fillRect(x,h-pad-bh,bw,bh); ctx.fillStyle=getCss('--muted'); ctx.font='11px system-ui'; text(ctx,shortDate(d.date),x+bw/2,h-9,'center');}); }
function text(ctx,str,x,y,align){ ctx.fillStyle=getCss('--muted'); ctx.textAlign=align||'left'; ctx.font='12px system-ui'; ctx.fillText(String(str),x,y); }
function getCss(v){ return getComputedStyle(document.documentElement).getPropertyValue(v).trim(); }
